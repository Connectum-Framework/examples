services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - events

  order-service:
    build: .
    command: ["node", "src/order-service.ts"]
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - REDIS_URL=redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - events

  inventory-service:
    build: .
    command: ["node", "src/inventory-service.ts"]
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - REDIS_URL=redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5002/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - events

networks:
  events:
    driver: bridge
