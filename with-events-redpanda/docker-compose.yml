services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
    ports:
      - "9092:9092"
      - "18082:18082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - events

  console:
    image: redpandadata/console:latest
    ports:
      - "8080:8080"
    environment:
      - CONFIG_FILEPATH=/etc/redpanda/console-config.yml
    volumes:
      - ./console-config.yml:/etc/redpanda/console-config.yml:ro
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - events

  order-service:
    build: .
    command: ["node", "src/order-service.ts"]
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001
      - REDPANDA_BROKERS=redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5001/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - events

  inventory-service:
    build: .
    command: ["node", "src/inventory-service.ts"]
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - REDPANDA_BROKERS=redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5002/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - events

networks:
  events:
    driver: bridge
